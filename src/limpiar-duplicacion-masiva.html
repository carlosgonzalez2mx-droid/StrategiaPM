<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧹 Limpiar Duplicación Masiva</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #333;
        }
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
        }
        .alert {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .alert.danger {
            background: #f8d7da;
            border-color: #f5c6cb;
            color: #721c24;
        }
        .alert.success {
            background: #d4edda;
            border-color: #c3e6cb;
            color: #155724;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #007bff;
        }
        .stat-card.danger {
            border-left-color: #dc3545;
        }
        .stat-card.warning {
            border-left-color: #ffc107;
        }
        .stat-number {
            font-size: 2em;
            font-weight: bold;
            color: #007bff;
        }
        .stat-number.danger {
            color: #dc3545;
        }
        .stat-number.warning {
            color: #ffc107;
        }
        .stat-label {
            color: #6c757d;
            margin-top: 5px;
        }
        button {
            background: linear-gradient(45deg, #dc3545, #c82333);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
            transition: all 0.3s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
        }
        .success {
            background: linear-gradient(45deg, #28a745, #1e7e34);
        }
        .warning {
            background: linear-gradient(45deg, #ffc107, #e0a800);
            color: #212529;
        }
        .info {
            background: linear-gradient(45deg, #17a2b8, #138496);
        }
        .result {
            margin: 20px 0;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
            font-size: 12px;
        }
        .success-result {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        .error-result {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        .info-result {
            background: #d1ecf1;
            border: 1px solid #bee5eb;
            color: #0c5460;
        }
        .project-analysis {
            margin: 20px 0;
        }
        .project-card {
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            padding: 15px;
            margin: 10px 0;
            border-left: 4px solid #28a745;
        }
        .project-card.danger {
            border-left-color: #dc3545;
        }
        .project-card.warning {
            border-left-color: #ffc107;
        }
        .project-header {
            font-weight: bold;
            color: #495057;
            margin-bottom: 10px;
        }
        .project-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            margin: 10px 0;
        }
        .project-stat {
            text-align: center;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 5px;
            font-size: 12px;
        }
        .project-stat.danger {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧹 Limpiar Duplicación Masiva</h1>
        
        <div class="alert danger" id="alertMessage">
            <strong>⚠️ ATENCIÓN:</strong> Esta herramienta está diseñada para limpiar duplicación masiva de tareas. 
            Usa con precaución y siempre haz backup antes de proceder.
        </div>

        <div class="stats" id="stats">
            <!-- Las estadísticas se llenarán dinámicamente -->
        </div>

        <div class="project-analysis" id="projectAnalysis">
            <!-- El análisis por proyecto se llenará dinámicamente -->
        </div>

        <div style="text-align: center; margin: 30px 0;">
            <button onclick="analyzeMassiveDuplication()">🔍 Analizar Duplicación Masiva</button>
            <button onclick="cleanMassiveDuplication()" class="danger">🧹 Limpiar Duplicación Masiva</button>
            <button onclick="createBackup()" class="warning">💾 Crear Backup</button>
            <button onclick="restoreBackup()" class="info">🔄 Restaurar Backup</button>
            <button onclick="exportReport()" class="success">📊 Exportar Reporte</button>
        </div>

        <div id="results" class="result info-result">
            Haz clic en "Analizar Duplicación Masiva" para comenzar el análisis...
        </div>
    </div>

    <script>
        let analysisData = null;

        // Función principal de análisis de duplicación masiva
        function analyzeMassiveDuplication() {
            const results = document.getElementById('results');
            results.className = 'result info-result';
            results.textContent = '🔍 Analizando duplicación masiva...';

            try {
                // Obtener datos del localStorage
                const portfolioData = localStorage.getItem('mi-dashboard-portfolio');
                if (!portfolioData) {
                    results.className = 'result error-result';
                    results.textContent = '❌ No se encontraron datos en localStorage';
                    return;
                }

                const data = JSON.parse(portfolioData);
                const tasksByProject = data.tasksByProject || {};
                const projects = data.projects || [];

                let totalTasks = 0;
                let totalDuplicates = 0;
                let projectsWithDuplicates = 0;
                const projectAnalysis = [];

                // Analizar cada proyecto
                Object.entries(tasksByProject).forEach(([projectId, tasks]) => {
                    const project = projects.find(p => p.id === projectId);
                    const projectName = project ? project.name : `Proyecto ${projectId}`;

                    if (!Array.isArray(tasks)) {
                        console.warn(`⚠️ Proyecto ${projectId} no tiene tareas válidas:`, typeof tasks);
                        return;
                    }

                    totalTasks += tasks.length;

                    // Detectar duplicados por ID
                    const taskIds = new Map();
                    const duplicateIds = [];

                    tasks.forEach((task, index) => {
                        if (!taskIds.has(task.id)) {
                            taskIds.set(task.id, []);
                        }
                        taskIds.get(task.id).push({ task, index });
                    });

                    // Identificar duplicados
                    taskIds.forEach((taskList, taskId) => {
                        if (taskList.length > 1) {
                            duplicateIds.push({
                                taskId,
                                count: taskList.length,
                                positions: taskList.map(t => t.index)
                            });
                        }
                    });

                    const projectDuplicates = duplicateIds.length;
                    totalDuplicates += duplicateIds.reduce((sum, dup) => sum + (dup.count - 1), 0);

                    if (projectDuplicates > 0) {
                        projectsWithDuplicates++;
                    }

                    projectAnalysis.push({
                        projectId,
                        projectName,
                        totalTasks: tasks.length,
                        duplicateIds: projectDuplicates,
                        duplicateTasks: duplicateIds.reduce((sum, dup) => sum + (dup.count - 1), 0),
                        duplicates: duplicateIds,
                        isMassive: tasks.length > 500,
                        avgDuplicates: projectDuplicates > 0 ? duplicateIds.reduce((sum, dup) => sum + dup.count, 0) / duplicateIds.length : 0
                    });
                });

                // Actualizar estadísticas
                updateStats({
                    totalTasks,
                    totalDuplicates,
                    projectsWithDuplicates,
                    totalProjects: Object.keys(tasksByProject).length
                });

                // Actualizar análisis por proyecto
                updateProjectAnalysis(projectAnalysis);

                // Generar reporte
                let reportText = `🔍 ANÁLISIS DE DUPLICACIÓN MASIVA\n`;
                reportText += `===================================\n\n`;
                reportText += `📊 RESUMEN GENERAL:\n`;
                reportText += `• Total de tareas: ${totalTasks}\n`;
                reportText += `• Tareas duplicadas: ${totalDuplicates}\n`;
                reportText += `• Proyectos con duplicados: ${projectsWithDuplicates}/${Object.keys(tasksByProject).length}\n`;
                reportText += `• Porcentaje de duplicación: ${totalTasks > 0 ? ((totalDuplicates / totalTasks) * 100).toFixed(2) : 0}%\n\n`;

                if (totalDuplicates > 0) {
                    reportText += `🚨 DUPLICACIÓN DETECTADA:\n\n`;
                    projectAnalysis.forEach(project => {
                        if (project.duplicateTasks > 0) {
                            reportText += `📁 ${project.projectName} (${project.projectId}):\n`;
                            reportText += `  • Total tareas: ${project.totalTasks}\n`;
                            reportText += `  • Tareas duplicadas: ${project.duplicateTasks}\n`;
                            reportText += `  • IDs duplicados: ${project.duplicateIds}\n`;
                            
                            if (project.isMassive) {
                                reportText += `  ⚠️ PROYECTO MASIVO (${project.totalTasks} tareas)\n`;
                            }
                            
                            if (project.duplicates.length > 0) {
                                reportText += `  • Detalles de duplicados:\n`;
                                project.duplicates.slice(0, 5).forEach(dup => {
                                    reportText += `    - ${dup.taskId}: ${dup.count} instancias (posiciones: ${dup.positions.join(', ')})\n`;
                                });
                                if (project.duplicates.length > 5) {
                                    reportText += `    ... y ${project.duplicates.length - 5} más\n`;
                                }
                            }
                            reportText += `\n`;
                        }
                    });

                    if (totalDuplicates > 100) {
                        reportText += `🚨 DUPLICACIÓN MASIVA DETECTADA\n`;
                        reportText += `Se recomienda usar la función de limpieza masiva.\n\n`;
                    }
                } else {
                    reportText += `✅ NO SE DETECTARON DUPLICADOS\n`;
                    reportText += `El sistema está limpio de duplicación.\n`;
                }

                results.textContent = reportText;
                results.className = totalDuplicates > 0 ? 'result error-result' : 'result success-result';

                // Actualizar alerta
                const alertElement = document.getElementById('alertMessage');
                if (totalDuplicates > 100) {
                    alertElement.className = 'alert danger';
                    alertElement.innerHTML = `<strong>🚨 DUPLICACIÓN MASIVA DETECTADA:</strong> ${totalDuplicates} tareas duplicadas encontradas. Se recomienda limpiar inmediatamente.`;
                } else if (totalDuplicates > 0) {
                    alertElement.className = 'alert warning';
                    alertElement.innerHTML = `<strong>⚠️ DUPLICACIÓN DETECTADA:</strong> ${totalDuplicates} tareas duplicadas encontradas. Considera limpiar.`;
                } else {
                    alertElement.className = 'alert success';
                    alertElement.innerHTML = `<strong>✅ SISTEMA LIMPIO:</strong> No se detectaron duplicados. El sistema está funcionando correctamente.`;
                }

                // Guardar datos de análisis
                analysisData = {
                    timestamp: new Date().toISOString(),
                    summary: {
                        totalTasks,
                        totalDuplicates,
                        projectsWithDuplicates,
                        totalProjects: Object.keys(tasksByProject).length
                    },
                    projectAnalysis
                };

            } catch (error) {
                results.className = 'result error-result';
                results.textContent = `❌ Error durante el análisis: ${error.message}`;
            }
        }

        // Limpiar duplicación masiva
        function cleanMassiveDuplication() {
            if (!analysisData || analysisData.summary.totalDuplicates === 0) {
                alert('⚠️ No hay duplicados para limpiar. Primero ejecuta el análisis.');
                return;
            }

            if (!confirm(`⚠️ ¿Estás seguro de que quieres limpiar ${analysisData.summary.totalDuplicates} tareas duplicadas?\n\nEsta acción no se puede deshacer.`)) {
                return;
            }

            const results = document.getElementById('results');
            results.className = 'result info-result';
            results.textContent = '🧹 Limpiando duplicación masiva...';

            try {
                const portfolioData = localStorage.getItem('mi-dashboard-portfolio');
                if (!portfolioData) {
                    results.className = 'result error-result';
                    results.textContent = '❌ No se encontraron datos en localStorage';
                    return;
                }

                const data = JSON.parse(portfolioData);
                const tasksByProject = data.tasksByProject || {};
                let totalCleaned = 0;

                // Limpiar duplicados en cada proyecto
                analysisData.projectAnalysis.forEach(projectAnalysis => {
                    if (projectAnalysis.duplicateTasks > 0) {
                        const projectId = projectAnalysis.projectId;
                        const tasks = tasksByProject[projectId];
                        
                        if (Array.isArray(tasks)) {
                            // Crear mapa de tareas únicas (mantener la primera ocurrencia)
                            const uniqueTasks = [];
                            const seenIds = new Set();
                            
                            tasks.forEach(task => {
                                if (!seenIds.has(task.id)) {
                                    uniqueTasks.push(task);
                                    seenIds.add(task.id);
                                }
                            });
                            
                            tasksByProject[projectId] = uniqueTasks;
                            totalCleaned += tasks.length - uniqueTasks.length;
                        }
                    }
                });

                // Guardar datos limpios
                data.tasksByProject = tasksByProject;
                data.timestamp = new Date().toISOString();
                localStorage.setItem('mi-dashboard-portfolio', JSON.stringify(data));

                results.className = 'result success-result';
                results.textContent = `🧹 LIMPIEZA MASIVA COMPLETADA:\n\n`;
                results.textContent += `• Tareas duplicadas eliminadas: ${totalCleaned}\n`;
                results.textContent += `• Proyectos procesados: ${analysisData.projectAnalysis.length}\n`;
                results.textContent += `• Datos guardados en localStorage\n\n`;
                results.textContent += `✅ La limpieza se completó exitosamente.\n`;
                results.textContent += `🔄 Recarga la aplicación principal para ver los cambios.\n`;
                results.textContent += `📊 El sistema ahora debería funcionar sin bloqueos de guardado.`;

                // Actualizar estadísticas
                analysisData.summary.totalDuplicates = 0;
                analysisData.summary.totalTasks -= totalCleaned;
                updateStats(analysisData.summary);

                // Actualizar alerta
                const alertElement = document.getElementById('alertMessage');
                alertElement.className = 'alert success';
                alertElement.innerHTML = `<strong>✅ LIMPIEZA COMPLETADA:</strong> ${totalCleaned} tareas duplicadas eliminadas. El sistema está limpio.`;

            } catch (error) {
                results.className = 'result error-result';
                results.textContent = `❌ Error durante la limpieza: ${error.message}`;
            }
        }

        // Crear backup
        function createBackup() {
            try {
                const portfolioData = localStorage.getItem('mi-dashboard-portfolio');
                if (!portfolioData) {
                    alert('❌ No se encontraron datos para hacer backup');
                    return;
                }

                const backupData = {
                    data: JSON.parse(portfolioData),
                    timestamp: new Date().toISOString(),
                    type: 'massive-duplication-backup'
                };

                const blob = new Blob([JSON.stringify(backupData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `backup-duplicacion-masiva-${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                alert('✅ Backup creado exitosamente');

            } catch (error) {
                alert(`❌ Error al crear backup: ${error.message}`);
            }
        }

        // Restaurar backup
        function restoreBackup() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const backupData = JSON.parse(e.target.result);
                            if (backupData.type === 'massive-duplication-backup' && backupData.data) {
                                localStorage.setItem('mi-dashboard-portfolio', JSON.stringify(backupData.data));
                                alert('✅ Backup restaurado exitosamente');
                                analyzeMassiveDuplication(); // Re-analizar
                            } else {
                                alert('❌ Archivo de backup inválido');
                            }
                        } catch (error) {
                            alert(`❌ Error al restaurar backup: ${error.message}`);
                        }
                    };
                    reader.readAsText(file);
                }
            };
            input.click();
        }

        // Exportar reporte
        function exportReport() {
            if (!analysisData) {
                alert('⚠️ Primero debes ejecutar el análisis.');
                return;
            }

            try {
                const exportData = {
                    ...analysisData,
                    exportDate: new Date().toISOString(),
                    tool: 'Limpiar Duplicación Masiva'
                };

                const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `reporte-duplicacion-masiva-${new Date().toISOString().split('T')[0]}.json`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);

                alert('✅ Reporte exportado exitosamente');

            } catch (error) {
                alert(`❌ Error al exportar: ${error.message}`);
            }
        }

        // Actualizar estadísticas
        function updateStats(stats) {
            const statsContainer = document.getElementById('stats');
            statsContainer.innerHTML = `
                <div class="stat-card ${stats.totalDuplicates > 0 ? 'danger' : ''}">
                    <div class="stat-number ${stats.totalDuplicates > 0 ? 'danger' : ''}">${stats.totalTasks}</div>
                    <div class="stat-label">Total Tareas</div>
                </div>
                <div class="stat-card ${stats.totalDuplicates > 100 ? 'danger' : stats.totalDuplicates > 0 ? 'warning' : ''}">
                    <div class="stat-number ${stats.totalDuplicates > 100 ? 'danger' : stats.totalDuplicates > 0 ? 'warning' : ''}">${stats.totalDuplicates}</div>
                    <div class="stat-label">Tareas Duplicadas</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.projectsWithDuplicates}</div>
                    <div class="stat-label">Proyectos con Duplicados</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">${stats.totalProjects}</div>
                    <div class="stat-label">Total Proyectos</div>
                </div>
            `;
        }

        // Actualizar análisis por proyecto
        function updateProjectAnalysis(projects) {
            const analysisContainer = document.getElementById('projectAnalysis');
            
            if (projects.length === 0) {
                analysisContainer.innerHTML = '<p>No hay proyectos para analizar</p>';
                return;
            }

            analysisContainer.innerHTML = projects.map(project => `
                <div class="project-card ${project.isMassive ? 'danger' : project.duplicateTasks > 0 ? 'warning' : ''}">
                    <div class="project-header">📁 ${project.projectName}</div>
                    <div class="project-stats">
                        <div class="project-stat ${project.duplicateTasks > 0 ? 'danger' : ''}">
                            <strong>${project.totalTasks}</strong><br>Tareas
                        </div>
                        <div class="project-stat ${project.duplicateTasks > 0 ? 'danger' : ''}">
                            <strong>${project.duplicateTasks}</strong><br>Duplicadas
                        </div>
                        <div class="project-stat ${project.duplicateIds > 0 ? 'danger' : ''}">
                            <strong>${project.duplicateIds}</strong><br>IDs Duplicados
                        </div>
                        <div class="project-stat">
                            <strong>${project.avgDuplicates.toFixed(1)}</strong><br>Promedio
                        </div>
                    </div>
                    ${project.isMassive ? '<div style="color: #dc3545; font-weight: bold; margin-top: 10px;">⚠️ PROYECTO MASIVO</div>' : ''}
                </div>
            `).join('');
        }

        // Ejecutar análisis automático al cargar
        window.onload = function() {
            analyzeMassiveDuplication();
        };
    </script>
</body>
</html>
